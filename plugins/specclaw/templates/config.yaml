# SpecClaw Configuration
# Generated by: specclaw init
version: 1

project:
  name: ""
  description: ""
  repo: ""

# Model routing — use the best model for each phase
models:
  planning: "anthropic/claude-opus-4-6"      # Proposals, specs, design
  coding: "openai/gpt-5.1-codex"             # Implementation
  review: "anthropic/claude-sonnet-4-5"       # Verification & code review

# Git strategy
#
# Git strategies:
#   branch-per-change    — one branch per change, switches working directory (default)
#   direct               — commits straight to current branch
#   worktree-per-change  — isolated worktree per change, enables parallel multi-change builds
git:
  strategy: "branch-per-change"   # "branch-per-change" | "direct" | "worktree-per-change"
  auto_commit: true
  commit_prefix: "specclaw"       # Prefix for auto-commits
  branch_prefix: "specclaw/"      # Prefix for feature branches
  worktree_dir: ".specclaw/worktrees"  # Base directory for worktrees (worktree-per-change only)

# Build settings
build:
  test_command: ""                 # e.g., "npm test", "pytest"
  lint_command: ""                 # e.g., "npm run lint"
  build_command: ""                # e.g., "npm run build"
  parallel_tasks: 3               # Max concurrent agent spawns
  timeout_seconds: 300             # Per-task timeout

# Notifications
notifications:
  enabled: true
  channel: "discord"              # "discord" | "telegram" | "slack"
  target: ""                      # Channel/user ID for updates
  on_complete: true
  on_failure: true
  on_approval_needed: true

# GitHub Issues integration (optional)
# When enabled, syncs proposals as GitHub Issues with task checklists
github:
  sync: false                    # Enable GitHub Issues sync
  repo: ""                       # owner/repo (auto-detected from git remote if empty)
  token: ""                      # GitHub PAT for curl fallback (not needed if gh CLI is authed)
  label: "specclaw"              # Label applied to SpecClaw issues

# Workflow enforcement
workflow:
  strict: true                     # Enforce phase prerequisites (disable for rapid prototyping)
  code_review: false               # Spawn code-reviewer agent during /specclaw:verify
  code_review_block: false         # Block /specclaw:pr if code review verdict is CHANGES_REQUESTED

# Autonomous build→verify→review loop (loop engineering)
# When enabled, build/verify/review iterate until all gates are green or a guardrail halts.
loop:
  enabled: true            # default-on; set false for single-pass build/verify
  max_iterations: 5        # local inner loop cap
  no_progress_limit: 2     # consecutive identical/empty turns → halt
  guard_action: "revert-tests"   # reward-hack guard: revert-tests | revert-turn
  test_paths: []           # globs identifying test files (reward-hack guard)
  ci_gate: false           # opt-in outer CI loop (GitHub Actions / Azure Pipelines)
  ci_max_iterations: 3     # CI outer loop cap
  ci_timeout_seconds: 1200 # per-cycle CI wall-clock before halt

# Automation
automation:
  auto_mode: false
  cron: ""                         # Cron expression for scheduled builds
  max_tasks_per_run: 5
  auto_verify: true                # Run verification after build
  auto_archive: false              # Archive on successful verification
  post_build_review: true          # Run automated review after build completes

# PR creation settings
pr:
  test_policy: ""   # Set on first `specclaw pr` run. Options: none | unit | e2e | both
                    # none  — no test checks before PR creation
                    # unit  — requires unit test evidence in verify-report + build.test_command set
                    # e2e   — requires e2e test evidence in verify-report + build.test_command set
                    # both  — requires unit + e2e evidence

# Plugin housekeeping
plugin:
  update_check: true   # /specclaw:status checks the plugin repo for a newer published
                       # version (max once/24h, cached in .specclaw/.update-check —
                       # add that file to .gitignore). Fail-silent: network problems
                       # never affect any command. Set false for zero network calls.

# Azure DevOps integration (optional)
# Run `specclaw auth azdo` to configure. Token stored in .specclaw/.env (gitignored).
azdo:
  enabled: false
  org: ""           # Organisation name — part after dev.azure.com/
  project: ""       # ADO project name
  repo: ""          # Repository name within the project
  boards:
    sync: false             # Set true to mirror proposals as Azure Boards Work Items
    work_item_type: "Feature"  # "Feature" | "User Story" | "Task" | "Bug" | "Epic"
    tag: "specclaw"         # Comma-separated. Tags help filter specclaw items in Boards queries.

# Jira integration (optional)
# Run `specclaw auth jira` to configure. Token stored in .specclaw/.env (gitignored).
jira:
  enabled: false
  domain: ""        # e.g. mycompany.atlassian.net
  email: ""         # Atlassian account email
  project_key: ""   # Project key shown in issue IDs, e.g. PROJ
  issue_type: "Story"  # Default issue type: Story | Task | Bug | Epic
