# SpecClaw Configuration
# Generated by: specclaw init
version: 1

project:
  name: "specclaw"
  description: "Spec-driven development framework for OpenClaw agents"
  repo: "chan4lk/specclaw"

# Model routing — use the best model for each phase
models:
  planning: "anthropic/claude-opus-4-8"      # Proposals, specs, design
  coding: "anthropic/claude-sonnet-5"        # Implementation
  review: "anthropic/claude-sonnet-5"        # Verification & code review

# Git strategy
git:
  strategy: "branch-per-change"   # "branch-per-change" | "direct"
  auto_commit: true
  commit_prefix: "specclaw"       # Prefix for auto-commits
  branch_prefix: "specclaw/"      # Prefix for feature branches

# Build settings
build:
  test_command: ""                 # e.g., "npm test", "pytest"
  lint_command: ""                 # e.g., "npm run lint"
  build_command: ""                # e.g., "npm run build"
  parallel_tasks: 3               # Max concurrent agent spawns
  timeout_seconds: 300             # Per-task timeout

  # Dynamically synthesized per-task build subagents (opt-in).
  # When enabled, each build task gets a bespoke agent: kind-classified,
  # minimal tools, cost-aware Claude model from the ladder below. Default
  # off — build dispatches the generic coder exactly as before.
  dynamic_agents:
    enabled: false
    ladder:                                    # task tier -> model (cheap -> strong)
      trivial:  "anthropic/claude-haiku-4-5"   # docs / rename / config
      standard: "anthropic/claude-sonnet-5"    # normal impl / test / refactor
      complex:  "anthropic/claude-opus-4-8"    # large / cross-module
      extreme:  "anthropic/claude-fable-5"     # highly-complex only (see cap)
    max_model: "anthropic/claude-opus-4-8"     # ceiling; extreme requires explicit highly-complex mark
    fable_max_fraction: 0.2                     # cap Fable share of tasks per build
    cache: true                                 # persist synthesized specs under changes/<change>/agents/

# Notifications
notifications:
  enabled: true
  channel: "discord"              # "discord" | "telegram" | "slack"
  target: ""                      # Channel/user ID for updates
  on_complete: true
  on_failure: true
  on_approval_needed: true

# GitHub Issues integration
github:
  sync: false   # Issues disabled on chan4lk/specclaw — validate-change would block every gate (see grounded-context L6)
  repo: "chan4lk/specclaw"
  token: ""
  label: "specclaw"

# Automation
automation:
  auto_mode: false
  cron: ""                         # Cron expression for scheduled builds
  max_tasks_per_run: 5
  auto_verify: true                # Run verification after build
  auto_archive: false              # Archive on successful verification

# PR creation settings
pr:
  test_policy: "none"   # set non-interactively for plugin packaging change (no app tests apply)

# Plugin version files — specclaw-pr will auto-bump patch if version unchanged vs base branch
plugin:
  version_files:
    - "plugins/specclaw/.claude-plugin/plugin.json"
    - ".claude-plugin/marketplace.json"
